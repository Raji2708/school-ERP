{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="{% static 'biostyle.css'%}">
    <title></title>
</head>
<body>

<h1 class="gallery-title">Image Gallery</h1>

<div class="gallery-container">
    {% for img in images %}
    <div class="gallery-card">
        <p>NAME:</p>
        <h3>{{ img.name }}</h3>
        <p>DESIGNATION:</p>
        <h3>{{ img.designation }}</h3>

        <div class="image-row">
            <img src="{{ img.photo.url }}" width="300">
        </div>
    </div>
    {% endfor %}
</div>


</body>
</html>
