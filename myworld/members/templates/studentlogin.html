{% load static %}
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="{% static 'newlogin.css' %}">
	<title></title>
</head>
<body>

	<center>
		<h1 class="page-title">STUDENT LOGIN</h1>
		<div class="login-box">
		<form action="studentloginrecord/" method="post">
			<span class="close">×</span>
            <h2>LOGIN</h2>
			{% csrf_token %}
			NAME:
			<input name="name" placeholder="NAME">
			<br><br>
			ID:
			<input name="ids" placeholder="ID">
			<br><br>
			<input type="submit" value="LOGIN" class="bttn">
		</form>
		</div>
	</center>
</body>
</html>
