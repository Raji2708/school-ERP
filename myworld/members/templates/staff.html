{% load static %}
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="{% static 'tables.css' %}">
	<title></title>

</head>
<body>


<center>
<h1 class="page-title">STUDENTS DETAILS</h1>

<table border="1" class="zigzag-table">
	<thead>
		<tr>
			<td>S.NO</td>
			<td>NAME</td>
			<td>ID</td>
			<td>AGE</td>
			<td>CLASS</td>
			<td>FEE</td>
			<td>BALANCE</td>
			<td>PERCENT</td>
		</tr>
	</thead>
	{% for x in student %}
	<tr>
		<td>{{ x.id }}</td>
		<td>{{ x.name }}</td>
		<td>{{ x.ids }}</td>
		<td>{{ x.age }}</td>
		<td>{{ x.classs }}</td>
		<td>{{ x.fee }}</td>
		<td>{{ x.balance }}</td>
		<td>{{ x.percent }}</td>
	</tr>
	{% endfor %}
</table>
</center>

<center><p>
	<a href="addcircular/" class="table-btn">ADD CIRCULAR</a>
</p></center>

</body>
</html>
