<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>
		/* Background Gradient */
body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  background: #d9d9d9;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px;
}

/* Page Title */
.title {
  color: white;
  margin-bottom: 30px;
  font-size: 32px;
  letter-spacing: 1px;
}

/* Grid Layout */
.grid-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* 4 columns */
  gap: 25px;
  width: 100%;
  max-width: 1100px;
}
/* Anchor Card */
.grid-item {
  text-decoration: none;
  background: rgba(255, 255, 255, 0.95);
  color: #333;
  padding: 35px 20px;
  text-align: center;
  border-radius: 16px;
  font-size: 20px;
  font-weight: 600;
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
  transition: all 0.35s ease;
}

/* Hover Effect */
.grid-item:hover {
  background: linear-gradient(135deg, #43cea2, #185a9d);
  color: #fff;
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.3);
}

	</style>
</head>
<body>
	
	<div class="grid-container">
		<a href="viewstudent/" class="grid-item">VIEW STUDENT</a><br><br>
		<a href="viewstaff/" class="grid-item">VIEW STAFF</a><br><br>
		<a href="viewadmin/" class="grid-item">VIEW ADMIN</a><br><br>
		<a href="addstafff/" class="grid-item">ADD STAFF</a><br><br>
		<a href="addadminn/" class="grid-item">ADD ADMIN</a><br><br>
		<a href="add/" class="grid-item">ADD STUDENT</a><br><br>
		<a href="change/" class="grid-item">CHANGE TYPE</a><br><br>
		<a href="delete/" class="grid-item">DELETE</a><br><br>
    <a href="allocate/" class="grid-item">ALLOCATE</a><br><br>
    <a href="uploadstd/" class="grid-item">STUDENT BIO</a><br><br>
		<a href="uploadx/" class="grid-item">STAFF BIO</a><br><br>
	</div>
	

</body>
</html>
